name: Refresh forecast

# Daily: pull fresh data, retrain, regenerate the report, publish to GitHub Pages.
on:
  schedule:
    - cron: "0 5 * * *"   # 05:00 UTC every day
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Ingest, train, and build report
        run: |
          python -m wroclaw_air_insights.pipeline ingest --days 365
          python -m wroclaw_air_insights.pipeline train
          python -m wroclaw_air_insights.report
      - uses: actions/upload-pages-artifact@v3
        with:
          path: reports/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
